<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoutora</title>

  <style>
    :root {
      --bg: #0a0a0a;
      --orange: #ff6b00;
      --text: #ffffff;
      --muted: #a1a1aa;
      --panel: #18181b;
      --line: #27272a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px;
      background: radial-gradient(circle at 50% 20%, rgba(255,107,0,.25), transparent 35%);
    }

    .dashboard {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 64px;
      margin: 0 0 10px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    h2 { margin-top: 0; }

    .orange { color: var(--orange); }

    p {
      font-size: 24px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      background: var(--orange);
      color: #000;
      font-weight: 900;
      padding: 14px 24px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn.secondary {
      background: #18181b;
      color: #fff;
      border: 1px solid #3f3f46;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
    }

    .value {
      font-size: 36px;
      font-weight: 900;
      color: var(--orange);
      margin-top: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 32px;
      font-weight: 900;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .pack {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      h1 { font-size: 42px; }
      p { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    let state = {
      coins: 1250,
      cards: 9,
      duplicates: 3,
      teams: 17,
      page: 'home'
    };

    function render() {
      if (state.page === 'home') renderHome();
      if (state.page === 'dashboard') renderDashboard();
      if (state.page === 'packs') renderPacks();
    }

    function renderHome() {
      document.getElementById('app').innerHTML = `
        <main class="hero">
          <div>
            <div style="font-size: 90px;">⚽</div>
            <h1>SCOUTORA</h1>
            <p>Discover. <span class="orange">Collect.</span> Rise.</p>
            <button class="btn" onclick="go('dashboard')">Start App</button>
          </div>
        </main>
      `;
    }

    function renderDashboard() {
      document.getElementById('app').innerHTML = `
        <main class="dashboard">
          <div class="topbar">
            <div class="logo">⚽ SCOUTORA</div>
            <button class="btn secondary" onclick="go('home')">Terug</button>
          </div>

          <h1>Welkom terug, <span class="orange">Scout</span></h1>
          <p>Je verzameling groeit elke keer als je packs opent.</p>

          <div class="cards">
            <div class="card">
              <h2>Coins</h2>
              <div class="value">${state.coins}</div>
            </div>

            <div class="card">
              <h2>Kaarten</h2>
              <div class="value">${state.cards}</div>
            </div>

            <div class="card">
              <h2>Dubbelen</h2>
              <div class="value">${state.duplicates}</div>
            </div>

            <div class="card">
              <h2>Teams</h2>
              <div class="value">${state.teams}</div>
            </div>
          </div>

          <div class="actions">
            <button class="btn" onclick="go('packs')">Packs openen</button>
            <button class="btn secondary" onclick="alert('Collectie komt hier!')">Mijn collectie</button>
            <button class="btn secondary" onclick="alert('Ruilen komt hier!')">Spelers ruilen</button>
          </div>
        </main>
      `;
    }

    function renderPacks() {
      document.getElementById('app').innerHTML = `
        <main class="dashboard">
          <div class="topbar">
            <div class="logo">📦 Packs</div>
            <button class="btn secondary" onclick="go('dashboard')">Terug</button>
          </div>

          <h1>Open een pack</h1>
          <p>Gebruik coins om nieuwe kaarten te verzamelen.</p>

          <div class="pack">
            <h2>Starter Pack</h2>
            <p>Kost 100 coins en bevat 5 kaarten.</p>
            <button class="btn" onclick="openStarterPack()">Open voor 100 coins</button>
          </div>
        </main>
      `;
    }

    function openStarterPack() {
      if (state.coins < 100) {
        alert('Niet genoeg coins!');
        return;
      }

      state.coins -= 100;
      state.cards += 5;
      state.duplicates += Math.floor(Math.random() * 3);

      alert('Je hebt 5 nieuwe kaarten geopend!');
      go('dashboard');
    }

    function go(page) {
      state.page = page;
      render();
    }

    render();
  </script>
</body>
</html>
